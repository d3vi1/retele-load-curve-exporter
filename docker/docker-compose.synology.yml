services:
  dso-load-curve-exporter:
    build:
      context: ..
    image: dso-load-curve-exporter:local
    container_name: dso-load-curve-exporter
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      EXPORTER_HOST: 0.0.0.0
      EXPORTER_PORT: "9831"
      EXPORTER_POLL_SECONDS: "${EXPORTER_POLL_SECONDS:-900}"
      EXPORTER_HEADLESS: "true"
    ports:
      - "127.0.0.1:9831:9831/tcp"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - prometheus-tancabesti

networks:
  prometheus-tancabesti:
    external: true
    name: prometheus-tancabesti_default
